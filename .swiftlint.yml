included:
  - TwinSnap

excluded:
  - build
  - DerivedData
  - .build

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - dx
    - dy

type_name:
  min_length: 3
  max_length: 60

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 120

reporter: "xcode"
